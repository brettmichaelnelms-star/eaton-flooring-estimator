<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eaton Hardwood Flooring Estimator</title>

<style>

body{
font-family:Arial;
color:white;
text-align:center;
background-image:url("http://www.eatonhardwoodfloors.com/assets/images/patterns-custom8-2000x1495-79.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.overlay{
background:rgba(0,0,0,0.65);
min-height:100vh;
padding-bottom:40px;
}

input{
padding:10px;
margin:5px;
width:130px;
font-size:16px;
}

button{
padding:10px;
margin:5px;
font-size:16px;
background:#2ecc71;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.deleteBtn{
background:#e74c3c;
}

table{
width:95%;
margin:auto;
border-collapse:collapse;
margin-top:20px;
background:rgba(0,0,0,0.7);
}

td,th{
border:1px solid #444;
padding:8px;
}

#results{
margin-top:20px;
font-size:20px;
}

</style>
</head>

<body>

<div class="overlay">

<h2>Eaton Hardwood Flooring Estimator</h2>

<h3>Enter Room</h3>

<input id="roomName" placeholder="Room Name"><br>

<input id="length" placeholder="Length (ft)">
<input id="width" placeholder="Width (ft)"><br>

<input id="price" placeholder="Price $/sq ft"><br>

<button onclick="addRoom()">Add Room</button>

<table id="roomTable">
<tr>
<th>Room</th>
<th>Sq Ft</th>
<th>Price / Sq Ft</th>
<th>Room Cost</th>
<th>Remove</th>
</tr>
</table>

<div id="results"></div>

</div>

<script>

let rooms=[];

function addRoom(){

let name=document.getElementById("roomName").value;
let length=parseFloat(document.getElementById("length").value);
let width=parseFloat(document.getElementById("width").value);
let price=parseFloat(document.getElementById("price").value);

if(!length || !width || !price) return;

let area=length*width;
let roomCost=area*price;

rooms.push({name,area,price,roomCost});

renderTable();

document.getElementById("roomName").value="";
document.getElementById("length").value="";
document.getElementById("width").value="";
document.getElementById("price").value="";
}

function deleteRoom(index){
rooms.splice(index,1);
renderTable();
}

function renderTable(){

let table=document.getElementById("roomTable");

table.innerHTML=`
<tr>
<th>Room</th>
<th>Sq Ft</th>
<th>Price / Sq Ft</th>
<th>Room Cost</th>
<th>Remove</th>
</tr>
`;

let totalSqFt=0;
let totalCost=0;

rooms.forEach((room,index)=>{

totalSqFt+=room.area;
totalCost+=room.roomCost;

let row=table.insertRow(-1);

row.insertCell(0).innerHTML=room.name;
row.insertCell(1).innerHTML=room.area.toFixed(2);
row.insertCell(2).innerHTML="$"+room.price.toFixed(2);
row.insertCell(3).innerHTML="$"+room.roomCost.toFixed(2);

row.insertCell(4).innerHTML=
`<button class="deleteBtn" onclick="deleteRoom(${index})">Delete</button>`;
});

calculateTotals(totalSqFt,totalCost);
}

function calculateTotals(totalSqFt,totalCost){

let waste=totalSqFt*0.10;
let finalSqFt=totalSqFt+waste;

let avgPrice = totalSqFt ? totalCost/totalSqFt : 0;
let finalCost=finalSqFt*avgPrice;

document.getElementById("results").innerHTML=
"Total Sq Ft: "+totalSqFt.toFixed(2)+
"<br>Waste (10%): "+waste.toFixed(2)+
"<br><b>Total Flooring Needed: "+finalSqFt.toFixed(2)+" sq ft</b>"+
"<br><br><b>Estimated Project Cost: $"+finalCost.toFixed(2)+"</b>";
}

</script>

</body>
</html>
