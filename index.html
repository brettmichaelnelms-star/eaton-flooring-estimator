<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eaton Hardwood Flooring — Estimate</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --oak: #c8a96e;
  --oak-light: #e8d5b0;
  --oak-dark: #8b6914;
  --walnut: #2c1f0e;
  --walnut-mid: #4a3520;
  --cream: #f9f4ec;
  --ink: #1a1208;
  --muted: #8a7a65;
  --danger: #c0392b;
  --success: #1e6e45;
  --info: #1a4a6e;
  --radius: 4px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--walnut);
  color: var(--cream);
  min-height: 100vh;
  background-image:
    url("https://www.eatonhardwoodfloors.com/assets/images/patterns-custom8-2000x1495-79.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

.overlay {
  min-height: 100vh;
  background: linear-gradient(160deg, rgba(20,12,4,0.93) 0%, rgba(30,18,6,0.90) 100%);
  padding: 0 0 60px;
}

/* ── HEADER ── */
.site-header {
  border-bottom: 1px solid rgba(200,169,110,0.25);
  padding: 28px 40px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.logo-mark {
  width: 48px;
  height: 48px;
  border: 2px solid var(--oak);
  border-radius: 2px;
  display: grid;
  place-items: center;
  flex-shrink: 0;
}

.logo-mark svg { width: 28px; height: 28px; }

.brand h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: .04em;
  color: var(--oak-light);
  line-height: 1;
}

.brand p {
  font-size: .75rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 4px;
}

/* ── MAIN GRID ── */
.main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 20px 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

@media (max-width: 760px) {
  .main { grid-template-columns: 1fr; }
  .site-header { padding: 20px; }
}

/* ── CARDS ── */
.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(200,169,110,0.18);
  border-radius: 8px;
  padding: 28px;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  color: var(--oak);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(200,169,110,0.18);
  display: flex;
  align-items: center;
  gap: 10px;
}

.card-title svg { flex-shrink: 0; }

/* ── FORM FIELDS ── */
.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  font-size: .7rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.field input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(200,169,110,0.25);
  border-radius: var(--radius);
  color: var(--cream);
  font-family: 'DM Sans', sans-serif;
  font-size: .95rem;
  padding: 10px 14px;
  transition: border-color .2s, background .2s;
  outline: none;
}

.field input:focus {
  border-color: var(--oak);
  background: rgba(200,169,110,0.08);
}

.field input::placeholder { color: rgba(249,244,236,0.25); }

.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 11px 20px;
  border: none;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: .85rem;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity .2s, transform .1s;
  white-space: nowrap;
}

.btn:hover { opacity: .88; }
.btn:active { transform: scale(.98); }

.btn-add    { background: var(--success); color: #fff; width: 100%; margin-top: 6px; }
.btn-delete { background: transparent; color: #e06c6c; border: 1px solid #c0392b; padding: 5px 10px; font-size: .75rem; border-radius: 3px; }
.btn-email  { background: var(--info); color: #fff; }
.btn-pdf    { background: var(--oak-dark); color: var(--cream); }
.btn-clear  { background: transparent; color: #e06c6c; border: 1px solid #c0392b; }

.action-row {
  max-width: 1100px;
  margin: 28px auto 0;
  padding: 0 20px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

/* ── TABLE ── */
.table-wrap {
  grid-column: 1 / -1;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: .9rem;
}

thead tr {
  background: rgba(200,169,110,0.12);
}

thead th {
  padding: 11px 14px;
  text-align: left;
  font-size: .68rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--oak);
  font-weight: 500;
  border-bottom: 1px solid rgba(200,169,110,0.2);
}

tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: background .15s;
}

tbody tr:hover { background: rgba(255,255,255,0.03); }

tbody td {
  padding: 11px 14px;
  color: rgba(249,244,236,0.85);
}

tbody td.room-name { color: var(--cream); font-weight: 500; }

.empty-state {
  text-align: center;
  padding: 32px;
  color: var(--muted);
  font-size: .85rem;
  letter-spacing: .06em;
}

/* ── RESULTS ── */
.results-card {
  grid-column: 1 / -1;
  background: rgba(200,169,110,0.07);
  border: 1px solid rgba(200,169,110,0.3);
  border-radius: 8px;
  padding: 24px 28px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 20px;
}

.stat { text-align: center; }

.stat-label {
  font-size: .68rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.stat-value {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  color: var(--oak-light);
  line-height: 1;
}

.stat-value.big {
  font-size: 2rem;
  color: var(--oak);
}

.divider {
  width: 1px;
  background: rgba(200,169,110,0.2);
  align-self: stretch;
}

@media (max-width: 600px) { .divider { display: none; } }

/* ── EXTRAS ── */
.extras-toggle {
  max-width: 1100px;
  margin: 24px auto 0;
  padding: 0 20px;
}

.extras-toggle button {
  background: none;
  border: 1px dashed rgba(200,169,110,0.4);
  border-radius: 6px;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: .8rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 10px 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: color .2s, border-color .2s;
}

.extras-toggle button:hover { color: var(--oak); border-color: var(--oak); }
.extras-toggle button .chevron { transition: transform .25s; display: inline-block; }
.extras-toggle button.open .chevron { transform: rotate(180deg); }

.extras-panel {
  max-width: 1100px;
  margin: 12px auto 0;
  padding: 0 20px;
  display: none;
}

.extras-panel.open { display: block; }

.extras-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(200,169,110,0.18);
  border-radius: 8px;
  padding: 20px;
}

.extras-grid .field { margin-bottom: 0; }
.extras-grid .field input { width: 100%; }

/* ── TAX / NOTES ── */
.meta-row {
  max-width: 1100px;
  margin: 24px auto 0;
  padding: 0 20px;
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 16px;
}
@media (max-width: 600px) { .meta-row { grid-template-columns: 1fr; } }
.meta-row .card { padding: 20px 22px; }
.meta-row textarea {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(200,169,110,0.25);
  border-radius: 4px;
  color: var(--cream);
  font-family: "DM Sans", sans-serif;
  font-size: .9rem;
  padding: 10px 14px;
  resize: vertical;
  min-height: 80px;
  outline: none;
  transition: border-color .2s;
}
.meta-row textarea:focus { border-color: var(--oak); }
.meta-row textarea::placeholder { color: rgba(249,244,236,0.25); }

/* fade-in rows */
@keyframes fadeRow {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: none; }
}
tbody tr { animation: fadeRow .2s ease both; }
</style>
</head>
<body>

<div class="overlay">

  <!-- Header -->
  <header class="site-header">
    <div class="logo-mark">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="10" width="24" height="4" rx="1" fill="#c8a96e"/>
        <rect x="2" y="16" width="24" height="4" rx="1" fill="#c8a96e" opacity=".7"/>
        <rect x="2" y="4"  width="24" height="4" rx="1" fill="#c8a96e" opacity=".4"/>
      </svg>
    </div>
    <div class="brand">
      <h1>Eaton Hardwood Flooring</h1>
      <p>Professional Estimate Tool</p>
    </div>
  </header>

  <!-- Main Grid -->
  <div class="main">

    <!-- Customer Info -->
    <div class="card">
      <div class="card-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Customer Information
      </div>
      <div class="field">
        <label>Full Name</label>
        <input id="customerName" placeholder="Jane Smith">
      </div>
      <div class="field">
        <label>Address</label>
        <input id="customerAddress" placeholder="123 Oak Lane, Dallas TX">
      </div>
      <div class="field">
        <label>Email</label>
        <input id="customerEmail" placeholder="jane@example.com" type="email">
      </div>
      <div class="field">
        <label>Estimate Valid Until</label>
        <input id="expiryDate" type="date">
      </div>
    </div>

    <!-- Add Room -->
    <div class="card">
      <div class="card-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Add Room
      </div>
      <div class="field">
        <label>Room Name</label>
        <input id="roomName" placeholder="Living Room">
      </div>
      <div class="row-2">
        <div class="field">
          <label>Length (ft)</label>
          <input id="length" placeholder="20" type="number" min="0">
        </div>
        <div class="field">
          <label>Width (ft)</label>
          <input id="width" placeholder="15" type="number" min="0">
        </div>
      </div>
      <div class="field">
        <label>Price per sq ft ($)</label>
        <input id="price" placeholder="6.50" type="number" min="0" step="0.01">
      </div>
      <button class="btn btn-add" onclick="addRoom()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Room
      </button>
    </div>

    <!-- Table -->
    <div class="card table-wrap">
      <div class="card-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
        Room Breakdown
      </div>
      <table id="roomTable">
        <thead>
          <tr>
            <th>Room</th>
            <th>Sq Ft</th>
            <th>$/sq ft</th>
            <th>Room Total</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="roomBody">
          <tr><td colspan="5" class="empty-state">No rooms added yet — add your first room above.</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Results -->
    <div class="results-card" id="resultsCard" style="display:none">
      <div class="stat">
        <div class="stat-label">Base Sq Ft</div>
        <div class="stat-value" id="resBase">—</div>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <div class="stat-label">Waste (10%)</div>
        <div class="stat-value" id="resWaste">—</div>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <div class="stat-label">Total Flooring Needed</div>
        <div class="stat-value" id="resTotal">—</div>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <div class="stat-label">Subtotal</div>
        <div class="stat-value" id="resSubtotal">—</div>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <div class="stat-label">Tax</div>
        <div class="stat-value" id="resTax">—</div>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <div class="stat-label">Total Due</div>
        <div class="stat-value big" id="resCost">—</div>
      </div>
    </div>

  </div><!-- /main -->

  <!-- Tax + Notes Row -->
  <div class="meta-row">
    <div class="card">
      <div class="card-title" style="font-size:.85rem; margin-bottom:14px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Tax Rate
      </div>
      <div class="field" style="margin:0">
        <label>Sales Tax (%)</label>
        <input id="taxRate" placeholder="0.00" type="number" min="0" max="30" step="0.01" oninput="if(rooms.length) renderTable()">
      </div>
    </div>
    <div class="card">
      <div class="card-title" style="font-size:.85rem; margin-bottom:14px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Estimate Notes
      </div>
      <div class="field" style="margin:0">
        <label>Special instructions, scope notes, materials spec…</label>
        <textarea id="estimateNotes" placeholder="e.g. Customer to move furniture. Install to begin after subfloor inspection. 3/4&#34; red oak select grade throughout."></textarea>
      </div>
    </div>
  </div>

  <!-- Additional Items Toggle -->
  <div class="extras-toggle">
    <button id="extrasBtn" onclick="toggleExtras()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Additional Items
      <svg class="chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </div>

  <!-- Additional Items Panel -->
  <div class="extras-panel" id="extrasPanel">
    <div class="extras-grid">
      <div class="field">
        <label>Item Label</label>
        <input id="extra1Label" placeholder="Demo / Tear-Out" style="margin-bottom:6px">
        <input id="extra1Cost" placeholder="$0.00" type="number" min="0" step="0.01">
      </div>
      <div class="field">
        <label>Item Label</label>
        <input id="extra2Label" placeholder="Stairs">
        <input id="extra2Cost" placeholder="$0.00" type="number" min="0" step="0.01" style="margin-top:6px">
      </div>
      <div class="field">
        <label>Item Label</label>
        <input id="extra3Label" placeholder="Transitions / Thresholds">
        <input id="extra3Cost" placeholder="$0.00" type="number" min="0" step="0.01" style="margin-top:6px">
      </div>
      <div class="field">
        <label>Item Label</label>
        <input id="extra4Label" placeholder="Subfloor Prep">
        <input id="extra4Cost" placeholder="$0.00" type="number" min="0" step="0.01" style="margin-top:6px">
      </div>
      <div class="field">
        <label>Item Label</label>
        <input id="extra5Label" placeholder="Other">
        <input id="extra5Cost" placeholder="$0.00" type="number" min="0" step="0.01" style="margin-top:6px">
      </div>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="action-row">
    <button class="btn btn-email" onclick="emailEstimate()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      Email Estimate
    </button>
    <button class="btn btn-pdf" onclick="generatePDF()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Generate PDF
    </button>
    <button class="btn btn-clear" onclick="clearEstimate()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      New Estimate
    </button>
  </div>
</div><!-- /overlay -->

<script>
let rooms = [];

function addRoom() {
  const name   = document.getElementById("roomName").value.trim() || "Unnamed Room";
  const length = parseFloat(document.getElementById("length").value);
  const width  = parseFloat(document.getElementById("width").value);
  const price  = parseFloat(document.getElementById("price").value);

  if (!length || !width || !price) return;

  const area     = length * width;
  const roomCost = area * price;
  rooms.push({ name, area, price, roomCost });
  renderTable();

  ["roomName","length","width","price"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("roomName").focus();
}

function deleteRoom(index) {
  rooms.splice(index, 1);
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById("roomBody");
  tbody.innerHTML = "";

  if (!rooms.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="empty-state">No rooms added yet — add your first room above.</td></tr>`;
    document.getElementById("resultsCard").style.display = "none";
    return;
  }

  let totalSqFt = 0, totalCost = 0;

  rooms.forEach((room, i) => {
    totalSqFt += room.area;
    totalCost += room.roomCost;
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="room-name">${room.name}</td>
      <td>${room.area.toFixed(1)}</td>
      <td>$${room.price.toFixed(2)}</td>
      <td>$${room.roomCost.toFixed(2)}</td>
      <td><button class="btn btn-delete" onclick="deleteRoom(${i})">Remove</button></td>
    `;
    tbody.appendChild(tr);
  });

  calculateTotals(totalSqFt, totalCost);
}

function calculateTotals(totalSqFt, totalCost) {
  const waste        = totalSqFt * 0.10;
  const finalSqFt    = totalSqFt + waste;
  const avgPrice     = totalSqFt ? totalCost / totalSqFt : 0;
  const flooringCost = finalSqFt * avgPrice;
  const extrasCost   = getExtras().reduce((s, e) => s + e.cost, 0);
  const subtotal     = flooringCost + extrasCost;
  const taxRate      = parseFloat(document.getElementById("taxRate").value) || 0;
  const taxAmt       = subtotal * (taxRate / 100);
  const finalCost    = subtotal + taxAmt;

  const fmt = v => "$" + v.toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});

  document.getElementById("resBase").textContent     = totalSqFt.toFixed(1) + " sq ft";
  document.getElementById("resWaste").textContent    = waste.toFixed(1) + " sq ft";
  document.getElementById("resTotal").textContent    = finalSqFt.toFixed(1) + " sq ft";
  document.getElementById("resSubtotal").textContent = fmt(subtotal);
  document.getElementById("resTax").textContent      = taxRate > 0 ? fmt(taxAmt) + " (" + taxRate + "%)" : "—";
  document.getElementById("resCost").textContent     = fmt(finalCost);
  document.getElementById("resultsCard").style.display = "grid";

  window.totalSqFt     = finalSqFt.toFixed(2);
  window.flooringCost  = flooringCost.toFixed(2);
  window.subtotal      = subtotal.toFixed(2);
  window.taxAmt        = taxAmt.toFixed(2);
  window.taxRate       = taxRate;
  window.totalEstimate = finalCost.toFixed(2);
}

function emailEstimate() {
  const email   = document.getElementById("customerEmail").value;
  const name    = document.getElementById("customerName").value;
  const address = document.getElementById("customerAddress").value;
  const subject = encodeURIComponent("Eaton Hardwood Flooring — Project Estimate");

  let roomLines = rooms.map(r =>
    `  ${r.name}: ${r.area.toFixed(1)} sq ft @ $${r.price.toFixed(2)}/sq ft = $${r.roomCost.toFixed(2)}`
  ).join("%0D%0A");

  const extras = getExtras();
  const extrasLines = extras.length
    ? "%0D%0AADDITIONAL ITEMS%0D%0A" + extras.map(e => `  ${e.label}: $${e.cost.toFixed(2)}`).join("%0D%0A")
    : "";

  const body =
    "Dear " + name + ",%0D%0A%0D%0A" +
    "Thank you for choosing Eaton Hardwood Flooring. Below is your project estimate.%0D%0A%0D%0A" +
    "Customer: " + name + "%0D%0A" +
    "Address: " + address + "%0D%0A" +
    (document.getElementById("expiryDate").value ? "Estimate Valid Until: " + new Date(document.getElementById("expiryDate").value + "T00:00:00").toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"}) + "%0D%0A" : "") +
    "%0D%0A" +
    "ROOM BREAKDOWN%0D%0A" + roomLines +
    extrasLines + "%0D%0A%0D%0A" +
    "Total Flooring Needed (incl. 10% waste): " + window.totalSqFt + " sq ft%0D%0A" +
    "Subtotal: $" + window.subtotal + "%0D%0A" +
    (window.taxRate > 0 ? "Sales Tax (" + window.taxRate + "%): $" + window.taxAmt + "%0D%0A" : "") +
    "TOTAL DUE: $" + window.totalEstimate + "%0D%0A%0D%0A" +
    (document.getElementById("estimateNotes").value.trim() ? "NOTES%0D%0A" + document.getElementById("estimateNotes").value.trim().replace(/\n/g,"%0D%0A") + "%0D%0A%0D%0A" : "") +
    "We look forward to working with you.%0D%0A" +
    "— Eaton Hardwood Flooring";

  window.location.href = "mailto:" + email + "?subject=" + subject + "&body=" + body;
}

function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const name    = document.getElementById("customerName").value || "—";
  const address = document.getElementById("customerAddress").value || "—";
  const email   = document.getElementById("customerEmail").value || "—";

  // Header bar
  doc.setFillColor(44, 31, 14);
  doc.rect(0, 0, 210, 36, "F");
  doc.setTextColor(232, 213, 176);
  doc.setFont("times", "bold");
  doc.setFontSize(20);
  doc.text("Eaton Hardwood Flooring", 14, 16);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(9);
  doc.setTextColor(160, 130, 90);
  doc.text("PROFESSIONAL ESTIMATE", 14, 24);

  const today = new Date().toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" });
  doc.setTextColor(160, 130, 90);
  doc.text("Date: " + today, 196, 24, { align: "right" });

    // Customer section
  doc.setTextColor(44, 31, 14);
  doc.setFont("helvetica", "bold");
  doc.setFontSize(10);
  doc.text("CUSTOMER", 14, 50);
  doc.setDrawColor(200, 169, 110);
  doc.line(14, 52, 196, 52);

  doc.setFont("helvetica", "normal");
  doc.setFontSize(10);
  doc.text("Name: "    + name,    14, 60);
  doc.text("Address: " + address, 14, 68);
  doc.text("Email: "   + email,   14, 76);

  const expiryRaw = document.getElementById("expiryDate").value;
  if (expiryRaw) {
    const expiryFmt = new Date(expiryRaw + "T00:00:00").toLocaleDateString("en-US", {year:"numeric",month:"long",day:"numeric"});
    doc.setFont("helvetica", "bold");
    doc.setTextColor(180, 50, 30);
    doc.text("Estimate Valid Until: " + expiryFmt, 14, 84);
    doc.setTextColor(44, 31, 14);
    doc.setFont("helvetica", "normal");
  }

  // Room table
  doc.setFont("helvetica", "bold");
  doc.setFontSize(10);
  doc.text("ROOM BREAKDOWN", 14, 92);
  doc.line(14, 94, 196, 94);

  const colX = [14, 80, 120, 160];
  const headers = ["Room", "Sq Ft", "$/sq ft", "Room Total"];
  doc.setFontSize(9);
  doc.setTextColor(100, 70, 20);
  headers.forEach((h, i) => doc.text(h, colX[i], 103));
  doc.setDrawColor(220, 190, 130);
  doc.line(14, 105, 196, 105);

  doc.setFont("helvetica", "normal");
  doc.setTextColor(44, 31, 14);
  let y = 113;

  rooms.forEach((r, idx) => {
    if (idx % 2 === 0) { doc.setFillColor(252, 248, 240); doc.rect(14, y - 6, 182, 9, "F"); }
    doc.text(r.name,                         colX[0], y);
    doc.text(r.area.toFixed(1),              colX[1], y);
    doc.text("$" + r.price.toFixed(2),       colX[2], y);
    doc.text("$" + r.roomCost.toFixed(2),    colX[3], y);
    y += 10;
  });

  // Totals
  y += 6;
  doc.setDrawColor(200, 169, 110);
  doc.line(14, y, 196, y);
  y += 10;

  const extras = getExtras();
  if (extras.length) {
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.setTextColor(100, 70, 20);
    doc.text("ADDITIONAL ITEMS", 14, y);
    y += 8;
    doc.setFont("helvetica", "normal");
    doc.setTextColor(44, 31, 14);
    extras.forEach((e, idx) => {
      if (idx % 2 === 0) { doc.setFillColor(252, 248, 240); doc.rect(14, y - 6, 182, 9, "F"); }
      doc.text(e.label, colX[0], y);
      doc.text("$" + e.cost.toFixed(2), colX[3], y);
      y += 10;
    });
    y += 4;
    doc.setDrawColor(200, 169, 110);
    doc.line(14, y, 196, y);
    y += 10;
  }

  const fmtPDF = v => "$" + parseFloat(v).toLocaleString("en-US", {minimumFractionDigits:2});

  doc.setFont("helvetica", "normal");
  doc.setFontSize(10);
  doc.setTextColor(44, 31, 14);
  doc.text("Flooring Cost (incl. 10% waste):", 14, y);
  doc.text(fmtPDF(window.flooringCost), 196, y, { align: "right" });
  y += 10;

  if (window.taxRate > 0) {
    doc.text("Sales Tax (" + window.taxRate + "%):", 14, y);
    doc.text(fmtPDF(window.taxAmt), 196, y, { align: "right" });
    y += 10;
  }

  doc.setDrawColor(200, 169, 110);
  doc.line(14, y, 196, y);
  y += 10;

  doc.setFont("helvetica", "bold");
  doc.setFontSize(12);
  doc.setTextColor(139, 105, 20);
  doc.text("TOTAL DUE:", 14, y);
  doc.text(fmtPDF(window.totalEstimate), 196, y, { align: "right" });
  y += 16;

  // Notes
  const notes = document.getElementById("estimateNotes").value.trim();
  if (notes) {
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.setTextColor(100, 70, 20);
    doc.text("NOTES", 14, y);
    doc.setDrawColor(200, 169, 110);
    doc.line(14, y + 2, 196, y + 2);
    y += 10;
    doc.setFont("helvetica", "normal");
    doc.setTextColor(44, 31, 14);
    doc.setFontSize(9);
    const noteLines = doc.splitTextToSize(notes, 182);
    doc.text(noteLines, 14, y);
    y += noteLines.length * 6 + 10;
  }

  // Signature line
  const sigY = Math.max(y + 10, 230);
  doc.setDrawColor(180, 150, 80);
  doc.setLineWidth(0.4);
  doc.line(14, sigY, 100, sigY);
  doc.line(116, sigY, 196, sigY);
  doc.setFont("helvetica", "normal");
  doc.setFontSize(8);
  doc.setTextColor(120, 90, 30);
  doc.text("Customer Signature", 14, sigY + 5);
  doc.text("Date", 116, sigY + 5);
  doc.setLineWidth(0.2);

  // Footer
  doc.setFontSize(8);
  doc.setFont("helvetica", "normal");
  doc.setTextColor(160, 130, 90);
  doc.text("Eaton Hardwood Flooring  |  eatonhardwoodfloors.com  |  Estimate subject to change upon site inspection.", 105, 285, { align: "center" });

  const safeName = name.trim().replace(/[^a-z0-9]/gi, "_");
  const today2 = new Date();
  const dateStr = today2.getFullYear() + "-" +
    String(today2.getMonth()+1).padStart(2,"0") + "-" +
    String(today2.getDate()).padStart(2,"0");

  const filename = safeName && safeName !== "—"
    ? `Eaton_Estimate_${safeName}_${dateStr}.pdf`
    : `Eaton_Estimate_${Date.now()}.pdf`;

  doc.save(filename);
}

function toggleExtras() {
  const btn   = document.getElementById("extrasBtn");
  const panel = document.getElementById("extrasPanel");
  btn.classList.toggle("open");
  panel.classList.toggle("open");
}

function getExtras() {
  return [1,2,3,4,5].map(i => {
    const label = document.getElementById(`extra${i}Label`).value.trim();
    const cost  = parseFloat(document.getElementById(`extra${i}Cost`).value) || 0;
    return { label: label || document.getElementById(`extra${i}Label`).placeholder, cost };
  }).filter(e => e.cost > 0);
}


function clearEstimate() {
  if (!confirm("Start a new estimate? All current data will be cleared.")) return;

  // Customer fields
  ["customerName","customerAddress","customerEmail","expiryDate","taxRate","estimateNotes"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = "";
  });

  // Extra items
  for (let i = 1; i <= 5; i++) {
    document.getElementById("extra"+i+"Label").value = "";
    document.getElementById("extra"+i+"Cost").value  = "";
  }

  // Rooms
  rooms = [];
  renderTable();

  // Hide results
  document.getElementById("resultsCard").style.display = "none";

  // Close extras panel
  document.getElementById("extrasPanel").classList.remove("open");
  document.getElementById("extrasBtn").classList.remove("open");

  // Reset globals
  window.totalSqFt = window.totalEstimate = window.flooringCost = window.subtotal = window.taxAmt = "0.00";
  window.taxRate = 0;

  // Set default expiry 30 days from today
  const exp = new Date();
  exp.setDate(exp.getDate() + 30);
  document.getElementById("expiryDate").value = exp.toISOString().split("T")[0];

  document.getElementById("customerName").focus();
}

// Allow Enter key to add room
// Set default expiry date to 30 days from today
(function() {
  const exp = new Date();
  exp.setDate(exp.getDate() + 30);
  document.getElementById("expiryDate").value = exp.toISOString().split("T")[0];
})();

["roomName","length","width","price"].forEach(id => {
  document.getElementById(id).addEventListener("keydown", e => { if (e.key === "Enter") addRoom(); });
});
</script>
